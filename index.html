<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Belajar Membaca Hangeul</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{ box-sizing:border-box; margin:0; padding:0; }

body{
 font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
 background:#f4f6fb;
 color:#222;
 min-height:100vh;
}

.hidden{ display:none !important; }

/* ===== COVER ===== */
#cover{
 min-height:100vh;
 background:linear-gradient(135deg,#4e73df,#6f9cff);
 color:#fff;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
 padding:40px 20px;
}
#cover h1{
 font-size:26px;
 margin-bottom:12px;
 line-height:1.3;
}
#cover p{
 font-size:16px;
 opacity:.9;
 margin-bottom:30px;
}
#startBtn{
 padding:16px 40px;
 font-size:18px;
 border:none;
 border-radius:30px;
 background:#fff;
 color:#4e73df;
 font-weight:700;
 cursor:pointer;
 min-height:56px;
}

/* ===== TOC ===== */
#toc{
 padding:20px 16px;
}
.bab{
 background:#fff;
 padding:24px;
 border-radius:16px;
 margin-bottom:16px;
 font-size:20px;
 font-weight:600;
 text-align:center;
 box-shadow:0 4px 12px rgba(0,0,0,.1);
 cursor:pointer;
 transition:transform .15s, opacity .15s;
 min-height:68px;
 display:flex;
 align-items:center;
 justify-content:center;
}
.bab:active{
 transform:scale(.96);
 opacity:.8;
}

/* ===== PAGE ===== */
#page{
 padding:20px 16px;
}
#babTitle{
 font-size:15px;
 text-align:center;
 opacity:.6;
 margin-bottom:24px;
 font-weight:500;
}
#page img{
 width:100%;
 max-height:40vh;
 object-fit:contain;
 border-radius:16px;
 margin-bottom:24px;
 background:#eee;
}
#text{
 font-size:36px;
 font-weight:700;
 text-align:center;
 line-height:1.4;
 margin-bottom:24px;
 word-break:break-word;
}
#progress{
 text-align:center;
 font-size:14px;
 opacity:.6;
}
</style>
</head>

<body>

<!-- COVER -->
<div id="cover">
 <h1>BELAJAR MEMBACA HANGEUL</h1>
 <p>Latihan mendengar & membaca bahasa Korea</p>
 <button id="startBtn">START</button>
</div>

<!-- DAFTAR ISI -->
<div id="toc" class="hidden">
 <div class="bab" onclick="openBab(1)">BAB 1 – Salam Dasar</div>
 <div class="bab" onclick="openBab(2)">BAB 2 – Perkenalan</div>
 <div class="bab" onclick="openBab(3)">BAB 3 – Ungkapan Sopan</div>
</div>

<!-- HALAMAN BAB -->
<div id="page" class="hidden">
 <div id="babTitle"></div>
 <img id="image" src="">
 <div id="text"></div>
 <div id="progress"></div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
const cover = document.getElementById("cover");
const toc = document.getElementById("toc");
const page = document.getElementById("page");
const startBtn = document.getElementById("startBtn");

const babTitleEl = document.getElementById("babTitle");
const imageEl = document.getElementById("image");
const textEl = document.getElementById("text");
const progressEl = document.getElementById("progress");
const audioEl = document.getElementById("audio");

let babData = null;
let pageIndex = 0;

// Klik START → Hapus cover SELAMANYA dari halaman
startBtn.addEventListener("click",()=>{
 cover.remove();  // Ini kuncinya bro, remove total!
 toc.classList.remove("hidden");
});

function openBab(num){
 const path = `./modul/bab${num}.json`;

 fetch(path)
 .then(res=>{
 if(!res.ok) throw new Error("404");
 return res.json();
 })
 .then(data=>{
 babData = data;
 pageIndex = 0;

 babTitleEl.textContent = data.title;

 toc.classList.add("hidden");
 page.classList.remove("hidden");

 playPage();
 })
 .catch(()=>{
 alert("BAB belum tersedia atau file tidak ditemukan");
 });
}

function playPage(){
 const p = babData.pages[pageIndex];

 textEl.textContent = p.text;
 imageEl.src = `https://airnetcso.github.io/hangeul/image/${p.image}.jpg`;
 audioEl.src = `https://airnetcso.github.io/hangeul/audio/${p.audio}.mp3`;

 progressEl.textContent = `Halaman ${pageIndex+1} / ${babData.pages.length}`;

 audioEl.play();
}

audioEl.onended = ()=>{
 pageIndex++;
 if(pageIndex < babData.pages.length){
 playPage();
 } else {
 alert("Bab selesai!");
 page.classList.add("hidden");
 toc.classList.remove("hidden");
 pageIndex = 0;
 }
};
</script>

</body>
</html>
