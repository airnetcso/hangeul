<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Membaca Hangeul</title>

<style>
body{
  margin:0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f4f6fb;
  color:#222;
}

/* ===== GENERAL ===== */
.hidden{ display:none; }
.center{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  height:100vh;
}

/* ===== COVER ===== */
#cover{
  background:linear-gradient(135deg,#4e73df,#6f9cff);
  color:#fff;
}
#cover h1{
  font-size:28px;
  margin-bottom:10px;
}
#cover p{
  font-size:16px;
  opacity:.9;
}
#startBtn{
  margin-top:30px;
  padding:14px 28px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#fff;
  color:#4e73df;
  font-weight:bold;
}

/* ===== TOC ===== */
#toc{
  padding:20px;
}
#toc h2{
  text-align:center;
  margin-bottom:20px;
}
.bab{
  background:#fff;
  padding:16px;
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
  font-size:18px;
}

/* ===== PAGE ===== */
#page{
  padding:20px;
}
#page img{
  width:100%;
  border-radius:16px;
  margin-bottom:20px;
}
#text{
  font-size:28px;
  text-align:center;
  font-weight:bold;
}
#progress{
  text-align:center;
  font-size:14px;
  opacity:.6;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- ===== COVER ===== -->
<div id="cover" class="center">
  <h1>BELAJAR MEMBACA HANGEUL</h1>
  <p>Latihan mendengar & membaca bahasa Korea</p>
  <button id="startBtn">START</button>
</div>

<!-- ===== TOC ===== -->
<div id="toc" class="hidden">
  <h2>DAFTAR ISI</h2>
  <div class="bab" onclick="openBab(1)">BAB 1 – Salam Dasar</div>
  <div class="bab" onclick="openBab(2)">BAB 2 – Perkenalan</div>
  <div class="bab" onclick="openBab(3)">BAB 3 – Ungkapan Sopan</div>
  <div class="bab" onclick="openBab(4)">BAB 4 – Aktivitas Sehari-hari</div>
  <div class="bab" onclick="openBab(5)">BAB 5 – Tempat</div>
  <div class="bab" onclick="openBab(6)">BAB 6 – Waktu</div>
  <div class="bab" onclick="openBab(7)">BAB 7 – Keluarga</div>
  <div class="bab" onclick="openBab(8)">BAB 8 – Makanan</div>
  <div class="bab" onclick="openBab(9)">BAB 9 – Perasaan</div>
  <div class="bab" onclick="openBab(10)">BAB 10 – Kalimat Panjang</div>
</div>

<!-- ===== PAGE ===== -->
<div id="page" class="hidden">
  <img id="image">
  <div id="text"></div>
  <div id="progress"></div>
</div>

<audio id="audio"></audio>

<script>
const audioEl = document.getElementById("audio");
const imageEl = document.getElementById("image");
const textEl = document.getElementById("text");
const progressEl = document.getElementById("progress");

const cover = document.getElementById("cover");
const toc = document.getElementById("toc");
const page = document.getElementById("page");

/* ===== DATA BAB (CONTOH) ===== */
const babData = {
  1:[
    {t:"안녕하세요", i:"1-1", a:"1-1"},
    {t:"만나서 반갑습니다", i:"1-2", a:"1-2"},
    {t:"감사합니다", i:"1-3", a:"1-3"}
  ],
  2:[
    {t:"저는 학생입니다", i:"2-1", a:"2-1"},
    {t:"이름이 뭐예요?", i:"2-2", a:"2-2"}
  ]
};

let currentBab = 0;
let currentPage = 0;

/* ===== START ===== */
startBtn.onclick = ()=>{
  cover.classList.add("hidden");
  toc.classList.remove("hidden");
};

/* ===== OPEN BAB ===== */
function openBab(bab){
  currentBab = bab;
  currentPage = 0;
  toc.classList.add("hidden");
  page.classList.remove("hidden");
  playPage(true); // klik user → izin autoplay
}

/* ===== PLAY PAGE ===== */
function playPage(fromClick=false){
  const data = babData[currentBab][currentPage];
  textEl.textContent = data.t;
  imageEl.src = `https://airnetcso.github.io/hangeul/image/${data.i}.jpg`;
  audioEl.src = `https://airnetcso.github.io/hangeul/audio/${data.a}.mp3`;
  progressEl.textContent = `Halaman ${currentPage+1} / ${babData[currentBab].length}`;
  audioEl.play();
}

/* ===== AUTO NEXT ===== */
audioEl.onended = ()=>{
  currentPage++;
  if(currentPage < babData[currentBab].length){
    playPage();
  }
};
</script>

</body>
</html>
