<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belajar Membaca Hangeul</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f4f6fb;
  color:#222;
}
.hidden{ display:none; }

/* ===== COVER ===== */
#cover{
  height:100vh;
  background:linear-gradient(135deg,#4e73df,#6f9cff);
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}
#cover h1{
  font-size:28px;
  margin-bottom:10px;
}
#cover p{
  font-size:16px;
  opacity:.9;
}
#startBtn{
  margin-top:30px;
  padding:14px 32px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#fff;
  color:#4e73df;
  font-weight:700;
}

/* ===== TOC ===== */
#toc{
  padding:20px;
}
#toc h2{
  text-align:center;
  margin-bottom:20px;
}
.bab{
  background:#fff;
  padding:16px;
  border-radius:14px;
  margin-bottom:12px;
  font-size:18px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
  cursor:pointer;
  transition:.15s;
}
.bab:active{
  transform:scale(.97);
  opacity:.7;
}

/* ===== PAGE ===== */
#page{
  padding:16px;
}
#babTitle{
  font-size:14px;
  text-align:center;
  opacity:.6;
  margin-bottom:10px;
}

  width:100%;
  max-height:45vh;
  object-fit:cover;
  border-radius:14px
